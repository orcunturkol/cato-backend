services:
  # ── CATO API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cato-api
    restart: unless-stopped
    # Cap the API so a memory leak kills this container (which auto-restarts)
    # instead of the whole host. Inside a limited container the .NET GC defaults
    # its heap hard limit to 75% of the cgroup limit and throws OOM in-process.
    # memswap_limit == mem_limit forbids the container from touching host swap.
    mem_limit: 4g
    memswap_limit: 4g
    ports:
      # Loopback binding so host-side collectors (job-run reporter) can reach the
      # API at localhost:5039, matching how postgres/redis/rabbitmq are exposed.
      - "127.0.0.1:5039:8080"
      - "${TAILSCALE_IP}:5039:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=${RDS_HOST:-postgres};Port=${RDS_PORT:-5432};Database=cato;Username=cato_user;Password=${RDS_DB_PASSWORD:-cato_dev_password}"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: cato_user
      RabbitMQ__Password: cato_dev_password
      Redis__ConnectionString: "redis:6379"
      Redis__InstanceName: "cato"
      SteamWebApi__ApiKey: "${STEAM_WEB_API_KEY:-}"
      # Ship structured logs to the Seq container (overrides appsettings serverUrl; index 1 = the Seq sink)
      Serilog__WriteTo__1__Args__serverUrl: "http://seq:80"
    volumes:
      # Mount the collector's data dir at the SAME absolute path inside the
      # container, so the absolute file paths the collector puts in ingestion
      # messages resolve here. Set COLLECTOR_DATA_PATH in .env to the collector's
      # data dir on this host (e.g. /home/ubuntu/catoptric-data-collector/data).
      - ${COLLECTOR_DATA_PATH:-/home/ofturkol/catoptric-data-collector/data}:${COLLECTOR_DATA_PATH:-/home/ofturkol/catoptric-data-collector/data}:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_started

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: cato-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6379:6379"
      - "${TAILSCALE_IP}:6379:6379"
    volumes:
      - cato_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── RabbitMQ ──
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cato-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cato_user
      RABBITMQ_DEFAULT_PASS: cato_dev_password
    ports:
      - "${TAILSCALE_IP}:5672:5672"
      - "127.0.0.1:5672:5672"
      - "${TAILSCALE_IP}:15672:15672"
      - "127.0.0.1:15672:15672"
    volumes:
      - cato_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Seq (structured log search + alerting) ──
  # UI + ingestion on the same listener (container port 80). Browse logs and
  # configure failure alerts (Signals -> webhook) at http://<host>:5341.
  seq:
    image: datalust/seq:latest
    container_name: cato-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      # First-run admin password (required by Seq on initial store creation).
      # Set SEQ_ADMIN_PASSWORD in .env. Username is "admin".
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_ADMIN_PASSWORD:?set SEQ_ADMIN_PASSWORD in .env}"
    ports:
      - "127.0.0.1:5341:80"
      - "${TAILSCALE_IP}:5341:80"
    volumes:
      - cato_seq:/data

  # ── pgAdmin ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cato-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cato.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${TAILSCALE_IP}:5051:80"
    volumes:
      - cato_pgadmin:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro

  # ── Frontend ──
  frontend:
    build:
      context: ../cato-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://catoptricgames.duckdns.org/api}
    container_name: cato-frontend
    ports:
      - "${TAILSCALE_IP}:5173:80"
    restart: unless-stopped

  # ── Caddy reverse proxy (HTTPS for catoptricgames.duckdns.org via DuckDNS DNS-01) ──
  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: cato-caddy
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - "${TAILSCALE_IP}:443:443"
    environment:
      DUCKDNS_TOKEN: ${DUCKDNS_TOKEN}
      ACME_EMAIL: ${ACME_EMAIL:-ofturkol@proton.me}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - cato_caddy_data:/data
      - cato_caddy_config:/config
    depends_on:
      - api
      - frontend
      - pgadmin

  # ── EF Migration Helper (run with: docker compose run --rm ef-migration) ──
  ef-migration:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    volumes:
      - .:/src
    entrypoint: ["bash", "/src/generate-migration.sh"]
    profiles:
      - tools

volumes:
  cato_pgadmin:
  cato_rabbitmq:
  cato_redis:
  cato_caddy_data:
  cato_caddy_config:
  cato_seq:
