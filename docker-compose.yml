services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16
    container_name: cato-postgres
    environment:
      POSTGRES_DB: cato
      POSTGRES_USER: cato_user
      POSTGRES_PASSWORD: cato_dev_password
    ports:
      - "127.0.0.1:5434:5432"
      - "${TAILSCALE_IP}:5434:5432"
    volumes:
      - cato_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cato_user -d cato"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── CATO API ──
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cato-api
    ports:
      - "${TAILSCALE_IP}:5039:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=cato;Username=cato_user;Password=cato_dev_password"
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: "5672"
      RabbitMQ__UserName: cato_user
      RabbitMQ__Password: cato_dev_password
    volumes:
      - ${COLLECTOR_DATA_PATH:-/home/ofturkol/catoptric-data-collector/data}:/home/ofturkol/catoptric-data-collector/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── RabbitMQ ──
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cato-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cato_user
      RABBITMQ_DEFAULT_PASS: cato_dev_password
    ports:
      - "${TAILSCALE_IP}:5672:5672"
      - "127.0.0.1:5672:5672"
      - "${TAILSCALE_IP}:15672:15672"
      - "127.0.0.1:15672:15672"
    volumes:
      - cato_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── pgAdmin ──
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cato-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cato.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "${TAILSCALE_IP}:5051:80"
    volumes:
      - cato_pgadmin:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend ──
  frontend:
    build:
      context: ../cato-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5039}
    container_name: cato-frontend
    ports:
      - "${TAILSCALE_IP}:5173:80"
    restart: unless-stopped

  # ── EF Migration Helper (run with: docker compose run --rm ef-migration) ──
  ef-migration:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src
    volumes:
      - .:/src
    entrypoint: ["bash", "/src/generate-migration.sh"]
    profiles:
      - tools

volumes:
  cato_pgdata:
  cato_pgadmin:
  cato_rabbitmq:
